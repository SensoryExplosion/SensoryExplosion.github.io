<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pet Insurance — Card Composition</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet" />
  <script src="https://unpkg.com/@lottiefiles/dotlottie-wc@0.9.14/dist/dotlottie-wc.js" type="module"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --navy:          #0a285c;
      --brand-blue:    #135ee2;
      --sky:           #199cf9;
      --icon-bg-blue:  #e9eefa;
      --icon-bg-purple:#efebf6;
      --white:         #ffffff;
      --font:          'Inter', sans-serif;
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: #eef1f8;
      font-family: var(--font);
    }

    .pet-insurance-section {
      width: 100%;
      display: grid;
      place-items: center;
      padding: clamp(16px, 5vw, 48px);
      overflow: visible;
    }

    /* ── Composition container
       Exact dimensions from Figma spec: 514.8 × 376.05px
       All children are absolutely positioned using
       (figma_left - 765) and (figma_top - 204) as origin
    ─────────────────────────────────────────────────── */
    .composition {
      position: relative;
      width: min(100%, 514.8px);
      aspect-ratio: 514.8 / 376.05;
      container-type: inline-size;
      flex-shrink: 0;
      isolation: isolate;
    }

    /* ── Shared placeholder style ─────────────────────── */
    .placeholder {
      width: 100%;
      height: 100%;
      background: repeating-linear-gradient(
        -45deg,
        rgba(0,0,0,.04) 0, rgba(0,0,0,.04) 1px,
        transparent 1px, transparent 6px
      );
      border: 1.5px dashed rgba(0,0,0,.18);
      border-radius: inherit;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: var(--font);
      font-size: 9px;
      font-weight: 600;
      color: rgba(0,0,0,.3);
      letter-spacing: .03em;
      text-transform: uppercase;
      text-align: center;
      line-height: 1.4;
      padding: 4px;
    }

    /* ── 1. Umbrella tile ─────────────────────────────── */
    /* Group 12: left 1093−765=328, top 204−204=0 */
    .tile-umbrella {
      position: absolute;
      left: 63.7141%;
      top: 0;
      width: 23.7179%;
      height: 32.4691%;
      background: var(--sky);
      border-radius: 3.108cqw;
      overflow: hidden;
      z-index: 5;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow:
        0 11.014cqw 6.643cqw rgba(0,0,0,.05),
        0  4.895cqw 4.895cqw rgba(0,0,0,.09),
        0  1.224cqw 2.622cqw rgba(0,0,0,.10);
    }
    .tile-umbrella > svg {
      width: 13.986cqw;
      height: 13.986cqw;
      display: block;
    }

    /* ── 2. Pet illustration tile ─────────────────────── */
    /* left 926−765=161, top 250.15−204=46.15 */
    .tile-pet {
      position: absolute;
      left: 31.2743%;
      top: 12.2723%;
      width: 43.7063%;
      height: 59.8325%;
      background: var(--white);
      border-radius: 5.594cqw;
      overflow: hidden;
      z-index: 4;
      box-shadow:
        0 11.014cqw 6.643cqw rgba(0,0,0,.05),
        0  4.895cqw 4.895cqw rgba(0,0,0,.09),
        0  1.224cqw 2.622cqw rgba(0,0,0,.10);
    }
    .tile-pet .placeholder {
      border-radius: 0;
      border: none;
      font-size: 10px;
    }
    .pet-animation {
      width: 100%;
      height: 100%;
      display: block;
    }
    .pet-animation svg {
      width: 100%;
      height: 100%;
      display: block;
    }

    /* ── 3. "Your vet, your choice" card ──────────────── */
    /* left 765−765=0, top 331.75−204=127.75 */
    .card-vet {
      position: absolute;
      left: 0;
      top: 33.9715%;
      width: 62.5874%;
      height: 31.1661%;
      z-index: 2;
      background: var(--white);
      border-radius: 1.748cqw;
      padding: 5.594cqw 2.797cqw;
      display: flex;
      align-items: center;
      gap: 2.797cqw;
      box-shadow:
        0 15.559cqw 9.266cqw rgba(0,0,0,.05),
        0  6.818cqw 6.818cqw rgba(0,0,0,.09),
        0  1.748cqw 3.846cqw rgba(0,0,0,.10);
    }

    /* ── 4. "Veterinary care" card ────────────────────── */
    /* left 957.6−765=192.6, top 462.85−204=258.85 */
    .card-vet-care {
      position: absolute;
      left: 37.4126%;
      top: 68.8339%;
      width: 62.5874%;
      height: 31.1661%;
      z-index: 3;
      background: var(--white);
      border-radius: 1.748cqw;
      padding: 5.594cqw 2.797cqw;
      display: flex;
      align-items: center;
      gap: 2.797cqw;
      box-shadow:
        0 15.559cqw 9.266cqw rgba(0,0,0,.05),
        0  6.818cqw 6.818cqw rgba(0,0,0,.09);
    }

    /* ── 5. Terms acceptance banner ───────────────────── */
    /* left 820.8−765=55.8, top 465.85−204=261.85 */
    .banner-terms {
      position: absolute;
      left: 10.8392%;
      top: 69.6317%;
      width: 63.9860%;
      height: 17.4711%;
      z-index: 1;
      background: var(--white);
      border-radius: 1.748cqw;
      display: flex;
      align-items: center;
      gap: 2.448cqw;
      padding: 0 3.335cqw;
      filter: drop-shadow(0 3.885cqw 3.885cqw rgba(10,40,92,.05));
    }

    /* ── Card icon container ──────────────────────────── */
    .card-icon {
      flex-shrink: 0;
      width: 11.189cqw;
      height: 11.189cqw;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .card-icon svg {
      display: block;
      flex-shrink: 0;
    }
    .card-vet .card-icon svg {
      width: 5.633cqw;
      height: 5.828cqw;
    }
    .card-vet-care .card-icon svg {
      width: 6.216cqw;
      height: 5.828cqw;
    }
    .card-icon .placeholder {
      width: 6.993cqw;
      height: 6.993cqw;
      border-radius: .777cqw;
      font-size: 1.554cqw;
    }

    /* ── Card text ────────────────────────────────────── */
    .card-text {
      flex: 1;
      min-width: 0;
      display: flex;
      flex-direction: column;
      gap: .699cqw;
    }
    .card-title {
      font-size: 2.797cqw;
      font-weight: 700;
      line-height: 3.497cqw;
      color: var(--navy);
    }
    .card-body {
      font-size: 2.448cqw;
      font-weight: 400;
      line-height: 3.691cqw;
      color: var(--navy);
    }

    /* ── Banner checkmark ─────────────────────────────── */
    .checkmark {
      flex-shrink: 0;
      width: 3.846cqw;
      height: 3.846cqw;
      border-radius: 50%;
      background: var(--brand-blue);
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .checkmark svg {
      width: 2.137cqw;
      height: 2.137cqw;
      display: block;
    }
    .banner-text {
      font-size: 2.448cqw;
      font-weight: 400;
      line-height: 3.691cqw;
      color: var(--navy);
      width: 50.659cqw;
    }
  </style>
</head>
<body>

      </svg>
    </div>

    <!-- 2. Pet illustration — z:4, center -->
    <div class="tile-pet">
      <dotlottie-wc id="pet-hug-animation" class="pet-animation" src="https://lottie.host/13307d53-d595-486c-9500-54d30767be13/bp94djWR6p.lottie" style="width: 100%; height: 100%;" autoplay loop role="img" aria-label="Pet hug illustration animation"></dotlottie-wc>
    </div>

      <div class="card-icon" style="background:#efebf6;">

        </svg>
      </div>
      <div class="card-text">
        <p class="card-title">Your vet, your choice</p>
        <p class="card-body">Freedom to visit any licensed veterinary you and your pet trust.</p>
      </div>
    </div>

      <div class="card-icon" style="background:#e9eefa;">

      <div class="card-text">
        <p class="card-title">Veterinary care</p>
        <p class="card-body">Expert medical care to keep your pet healthy and happy.</p>
      </div>
    </div>

    <!-- 5. Terms banner — z:1, bottom-left (behind vet-care card) -->
    <div class="banner-terms">
      <div class="checkmark">
        <svg width="11" height="11" viewBox="0 0 12 12" fill="none">
          <path d="M2 6l3 3 5-5" stroke="white" stroke-width="1.8"
            stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      <p class="banner-text">By accepting, you confirm that you've read and agree to all the terms outlined above.</p>
    </div>

  </div>
</body>
</html>
